<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小说蒸馏监控面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#f0f4f8;
  color:#1a2332;
  font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif;
  font-size:15px;
  padding:20px;
}
.panel{
  background:#fff;
  border:1px solid #d0d8e4;
  border-radius:10px;
  margin-bottom:14px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(30,60,120,0.06);
}
.panel-header{
  background:#2c5aa0;
  color:#fff;
  padding:10px 18px;
  border-bottom:1px solid #1e4080;
  font-weight:600;
  font-size:14px;
  letter-spacing:.5px;
}
.panel-body{padding:14px 18px}
.grid{display:flex;flex-wrap:wrap;gap:14px}
.col{flex:1;min-width:300px}
.col2{min-width:420px}
.big{
  font-size:52px;
  font-weight:700;
  color:#2c5aa0;
  text-align:center;
  padding:16px 0 4px;
  line-height:1;
}
.sub{text-align:center;color:#5a6d84;font-size:13px;padding-bottom:10px;letter-spacing:.3px}
.bar-wrap{background:#e8edf5;border-radius:6px;height:10px;margin:8px 0}
.bar-fill{
  height:100%;
  border-radius:6px;
  background:linear-gradient(90deg,#2c5aa0,#4a80d4);
  transition:width .8s ease;
}
.bar-warn{background:linear-gradient(90deg,#c07800,#e6a817)}
.status-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;align-items:center}
.badge{
  padding:4px 12px;
  border-radius:20px;
  font-size:13px;
  font-weight:600;
}
.b-green{background:#d4edda;color:#1a5c2a}
.b-blue{background:#dbeafe;color:#1a4a9e}
.b-red{background:#f8d7da;color:#8b1a1a}
.b-yellow{background:#fff3cd;color:#7a5a00}
.b-gray{background:#e8edf5;color:#4a5568}
table{width:100%;border-collapse:collapse;font-size:14px}
th{
  text-align:left;
  padding:8px 12px;
  background:#f0f4f8;
  color:#4a5568;
  border-bottom:2px solid #d0d8e4;
  font-weight:600;
}
td{padding:7px 12px;border-bottom:1px solid #e8edf5}
tr:hover{background:#f0f4f8}
.ok{color:#1a7c3a;font-weight:600}
.err{color:#c0392b;font-weight:600}
.run{color:#2c5aa0;font-weight:600}
.wait{color:#7a8fa8}
.log-line{font-size:13px;padding:3px 0;border-bottom:1px solid #e8edf5;word-break:break-all;line-height:1.5}
.log-ts{color:#a0aec0;margin-right:8px;font-size:12px}
.footer{text-align:center;color:#a0aec0;font-size:12px;margin-top:14px}
a{color:#2c5aa0;text-decoration:none}
a:hover{text-decoration:underline}
.cur-book{font-size:18px;font-weight:700;color:#1a2332;margin-bottom:8px}
.cur-meta{color:#7a8fa8;font-size:13px;margin-bottom:12px}
.info-row{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px;font-size:14px;color:#4a5568}
.info-row strong{color:#1a2332}
.cur-age{color:#7a8fa8;font-size:13px;margin-top:8px}
.cur-status{margin-top:6px;font-size:14px;font-weight:600}
</style>
</head>
<body>
<div class="grid">
<div class="col">
<div class="panel">
<div class="panel-header">📊 概览</div>
<div class="panel-body">
<div class="big" id="completed">0</div>
<div class="sub">本已完成 / <span id="total">0</span> 本</div>
<div class="bar-wrap"><div class="bar-fill" id="total-bar" style="width:0%"></div></div>
<div class="status-row" style="margin-top:12px">
  <span class="badge b-green" id="badge-ok">✓ 成功 0</span>
  <span class="badge b-red" id="badge-err">✗ 失败 0</span>
  <span class="badge b-blue" id="badge-queue">列队 0</span>
</div>
</div>
</div>
<div class="panel">
<div class="panel-header">📖 当前书籍</div>
<div class="panel-body">
<div class="cur-book" id="cur-book">—</div>
<div class="cur-meta" id="cur-genre"></div>
<div class="status-row">
  <span class="badge b-blue" id="cur-stage">Tier ?</span>
  <span class="badge b-gray" id="cur-idx">? / ?</span>
  <span class="badge b-gray" id="cur-items">? 条</span>
</div>
<div class="cur-age">
  最后更新: <span id="cur-age">—</span>前 &nbsp;|&nbsp;
  重启: <span id="cur-restarts">0</span>/5
</div>
<div class="bar-wrap" style="margin-top:10px"><div class="bar-fill" id="cur-bar" style="width:0%"></div></div>
<div class="cur-status" id="cur-status"></div>
</div>
</div>
<div class="panel">
<div class="panel-header">⏱️ 运行信息</div>
<div class="panel-body">
<div class="info-row">
  <span>模式: <strong id="run-mode">—</strong></span>
  <span>模型: <strong id="run-model">—</strong></span>
</div>
<div class="info-row" style="margin-top:8px">
  总耗时: <strong id="run-elapsed">0s</strong> &nbsp;|&nbsp;
  状态: <span id="run-status">启动中</span>
</div>
</div>
</div>
</div>
<div class="col col2">
<div class="panel">
<div class="panel-header">📚 已处理书籍</div>
<div class="panel-body" style="max-height:340px;overflow-y:auto">
<table>
<thead><tr><th>#</th><th>书名</th><th>类型</th><th>状态</th><th>时间</th></tr></thead>
<tbody id="book-table"></tbody>
</table>
</div>
</div>
<div class="panel">
<div class="panel-header">📋 即将处理</div>
<div class="panel-body" style="max-height:170px;overflow-y:auto;font-size:14px" id="queue-list">
<div class="wait">扫描中...</div>
</div>
</div>
<div class="panel">
<div class="panel-header">📜 最新日志</div>
<div class="panel-body" style="max-height:210px;overflow-y:auto;font-family:'Courier New',Consolas,monospace" id="log-list"></div>
</div>
</div>
</div>
<div class="footer" style="text-align:center;color:#a0aec0;font-size:12px;margin-top:6px">
  每 30 秒静默刷新 &nbsp;|&nbsp; <span id="last-refresh">—</span>
</div>
</body>
<script>
const POLL = 30000;
let logLines = [];
let processedBooks = [];

function fmtTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
}
function fmtAge(iso) {
  if (!iso) return "?";
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return s + "s";
  return Math.floor(s/60) + "m " + (s%60) + "s";
}
function stripBook(s) {
  return s.replace(/ -- .*$/,'').replace(/\.txt$|\.epub$/,'').replace(/\u300a|\u300b|\u3008|\u3009/g,'');
}
async function poll() {
  let state = {};
  try {
    const r = await fetch('/api/state');
    state = await r.json();
  } catch(e) { return; }
  // overview
  const done = state.books_completed || 0;
  const total = state.books_total || 0;
  document.getElementById('completed').textContent = done;
  document.getElementById('total').textContent = total;
  document.getElementById('total-bar').style.width = (total>0 ? done/total*100 : 0) + '%';
  // status badges
  const books = state.processed_books || [];
  const ok = books.filter(b=>b.success).length;
  const err = books.filter(b=>!b.success).length;
  const queue = (state.queue_preview || []).length;
  document.getElementById('badge-ok').textContent = '✓ 成功 ' + ok;
  document.getElementById('badge-err').textContent = '✗ 失败 ' + err;
  document.getElementById('badge-queue').textContent = '列队 ' + (queue > 0 ? queue : (total - done - err));
  // current book
  document.getElementById('cur-book').textContent = stripBook(state.book_name || '（未检测到）');
  document.getElementById('cur-genre').textContent = state.genre || '';
  const stage = state.stage || '?';
  document.getElementById('cur-stage').textContent = 'Tier ' + stage.charAt(0).toUpperCase() + stage.slice(1);
  const idx = state.index || '?';
  const tot = state.total || '?';
  document.getElementById('cur-idx').textContent = idx + ' / ' + tot;
  document.getElementById('cur-items').textContent = (state.items||'?') + ' 条';
  document.getElementById('cur-age').textContent = fmtAge(state.last_update);
  document.getElementById('cur-restarts').textContent = state.restarts || 0;
  // progress bar
  const pct = (idx !== '?' && tot !== '?' && parseInt(tot)>0) ? parseInt(idx)/parseInt(tot)*100 : 0;
  const bar = document.getElementById('cur-bar');
  bar.style.width = pct + '%';
  bar.className = 'bar-fill' + (state.stall_warn ? ' bar-warn' : '');
  // status text
  const status = state.status || '启动中';
  const stEl = document.getElementById('cur-status');
  stEl.textContent = status;
  stEl.style.color = status.includes('STALL') || status.includes('卡死') ? '#c07800' : status.includes('完成') ? '#1a7c3a' : '#2c5aa0';
  // run info
  document.getElementById('run-mode').textContent = state.mode || '—';
  document.getElementById('run-model').textContent = state.ollama_model || '—';
  const elapsed = state.elapsed_total || 0;
  const em = Math.floor(elapsed/60), es = Math.floor(elapsed%60);
  document.getElementById('run-elapsed').textContent = em + 'm ' + es + 's';
  const rsEl = document.getElementById('run-status');
  rsEl.textContent = status;
  rsEl.style.color = status.includes('STALL')||status.includes('卡死') ? '#c07800' : status.includes('完成') ? '#1a7c3a' : '#2c5aa0';
  // processed books table
  processedBooks = books;
  const tbody = document.getElementById('book-table');
  const rows = books.slice(-50).reverse().map((b,i) =>
    '<tr>' +
    '<td>' + (books.length - i) + '</td>' +
    '<td>' + stripBook(b.book_file || b.book_name || '?') + '</td>' +
    '<td>' + (b.genre||'').substring(0,8) + '</td>' +
    '<td class="' + (b.success ? 'ok' : 'err') + '">' + (b.success ? '✓' : '✗') + '</td>' +
    '<td>' + fmtTime(b.processed_at) + '</td>' +
    '</tr>'
  ).join('');
  if (tbody.innerHTML !== rows) tbody.innerHTML = rows;
  // queue preview
  const q = state.queue_preview || [];
  const qEl = document.getElementById('queue-list');
  if (q.length === 0) {
    qEl.innerHTML = '<div class="wait">全部处理完成 或 无队列</div>';
  } else {
    qEl.innerHTML = q.slice(0,20).map(b =>
      '<div style="padding:2px 0;border-bottom:1px solid #21262d">' +
      '<span class="wait">▸</span> ' + stripBook(b[1]||b.book_name||'?') +
      ' <span class="b-gray" style="font-size:10px;padding:1px 4px;border-radius:3px">' + (b[0]||b.genre||'') + '</span>' +
      '</div>'
    ).join('');
    if (q.length > 20) qEl.innerHTML += '<div class="wait" style="padding-top:4px">... 还有 ' + (q.length-20) + ' 本</div>';
  }
  // log lines
  logLines = state.log_lines || [];
  const logEl = document.getElementById('log-list');
  logEl.innerHTML = logLines.slice(-50).map(l =>
    '<div class="log-line"><span class="log-ts">' + fmtTime(l.t) + '</span>' + escHtml(l.m) + '</div>'
  ).join('');
  logEl.scrollTop = logEl.scrollHeight;
  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString('zh-CN');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
setInterval(poll, POLL);
poll();
</script>
</html>
